# ============================================================================
# OpenVAS Scanner - Configuração
#
# Nota: As credenciais podem ser sobrescritas por variáveis de ambiente:
#   - GVM_HOST, GVM_PORT, GVM_USERNAME, GVM_PASSWORD
#
# Para usar variáveis de ambiente, crie um arquivo .env na raiz do projeto
# baseado no .env.example
# ============================================================================

# Conexão com o GVM (Greenbone Vulnerability Manager)
# Valores padrão - use argumentos CLI ou variáveis de ambiente para sobrescrever
host: "127.0.0.1"
port: 9390
username: "admin"
password: "admin"

# Configuração de Scan
# Opções comuns:
#   - "Full and fast" (recomendado, ~30-60min por host)
#   - "Full and fast ultimate"
#   - "Full and deep" (mais completo, ~2-4h por host)
#   - "Full and deep ultimate"
#   - "Discovery" (apenas descoberta, rápido)
scan_config_name: "Full and fast"

# Lista de portas a escanear
# Opções comuns:
#   - "All TCP and Nmap top 100 UDP" (recomendado)
#   - "All TCP"
#   - "All IANA assigned TCP"
#   - "Nmap top 1000 TCP and top 100 UDP"
port_list_name: "All TCP and Nmap top 100 UDP"

# Scanner a usar
scanner_name: "OpenVAS Default"

# Formatos de relatório para download
# Formatos disponíveis: PDF, XML, CSV, TXT, HTML, ITG
report_formats:
  - "PDF"
  - "XML"
  - "CSV"
  - "TXT"

# Diretório para salvar relatórios
output_dir: "./reports"

# Arquivo de estado (permite retomar scans interrompidos)
state_file: "./scanner_state.json"

# Comportamento
# cleanup_after_scan: se true, deleta task/target após scan (economiza espaço no GVM)
cleanup_after_scan: false

# Tentativas de reconexão em caso de falha
retry_attempts: 3
retry_delay: 10  # segundos entre tentativas

# Intervalo de polling para verificar status do scan (segundos)
poll_interval: 30

# Timeout de conexão (segundos)
connection_timeout: 120

# ============================================================================
# Configuração de Paralelismo
# ============================================================================

# Modo de scan paralelo
# Opções:
#   - "sequential" (padrão): Um IP por vez, comportamento tradicional
#   - "batch": Múltiplos IPs em um único target/task GVM (relatório consolidado)
#   - "parallel": Múltiplas tasks GVM executadas simultaneamente (relatórios individuais)
parallel:
  # Habilita/define o modo de scan
  # Pode ser sobrescrito via CLI: --mode batch/parallel
  mode: "sequential"

  # Máximo de scans paralelos (modo "parallel")
  # Recomendado: 2-4 para não sobrecarregar o GVM
  max_concurrent: 4

  # IPs por batch (modo "batch")
  # O GVM escaneia todos os hosts de um batch internamente em paralelo
  batch_size: 10
