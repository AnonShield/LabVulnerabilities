# =============================================================================
# VULNERABILITY SCAN LAB - 100+ APLICAÇÕES VULNERÁVEIS
# Para paper SBRC - Scan com OpenVAS
# =============================================================================
# 
# INSTRUÇÕES DE USO:
# 1. docker-compose pull    (baixar todas as imagens)
# 2. docker-compose up -d   (iniciar todos os containers)
# 3. docker-compose ps      (verificar status)
# 4. Aguardar ~5min para todos os serviços iniciarem
# 5. Rodar scan OpenVAS na rede 172.30.0.0/16
#
# REDE: Todos os containers estão na rede 172.30.0.0/16
# =============================================================================

version: '3.8'

networks:
  vulnnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:

  # ===========================================================================
  # CATEGORIA 1: METASPLOITABLE / SISTEMAS COMPLETOS (Múltiplos serviços)
  # ===========================================================================
  
  metasploitable2:
    image: tleemcjr/metasploitable2
    container_name: metasploitable2
    # Serviços: FTP(21), SSH(22), Telnet(23), SMTP(25), HTTP(80), SMB(139,445), MySQL(3306), PostgreSQL(5432), VNC(5900)
    networks:
      vulnnet:
        ipv4_address: 172.30.1.1
    tty: true
    stdin_open: true
    command: /bin/bash -c "/etc/init.d/networking start && /etc/init.d/xinetd start && /etc/init.d/apache2 start && /etc/init.d/ssh start && /etc/init.d/mysql start && /etc/init.d/postgresql start && /etc/init.d/samba start && sleep infinity"

  metasploitable3-web:
    image: tleemcjr/metasploitable3-linux
    container_name: metasploitable3
    networks:
      vulnnet:
        ipv4_address: 172.30.1.2
    tty: true

  # ===========================================================================
  # CATEGORIA 2: SERVIÇOS DE REDE - FTP
  # ===========================================================================

  vsftpd-backdoor:
    image: vulnerables/vsftpd-backdoor
    container_name: vsftpd-backdoor
    # vsftpd 2.3.4 com backdoor (CVE-2011-2523)
    networks:
      vulnnet:
        ipv4_address: 172.30.2.1
    ports:
      - "2121:21"
      - "6200:6200"

  proftpd-vuln:
    image: infosecwarrior/ftp:v1
    container_name: proftpd-vuln
    # ProFTPD vulnerável
    networks:
      vulnnet:
        ipv4_address: 172.30.2.2
    ports:
      - "2122:21"

  # ===========================================================================
  # CATEGORIA 3: SERVIÇOS DE REDE - SSH
  # ===========================================================================

  ssh-cve-2016-6515:
    image: vulnerables/cve-2016-6515
    container_name: ssh-vuln-dos
    # OpenSSH DoS (CVE-2016-6515)
    networks:
      vulnnet:
        ipv4_address: 172.30.3.1
    ports:
      - "2222:22"

  ubuntu-sshd-old:
    image: rastasheep/ubuntu-sshd:14.04
    container_name: ubuntu-ssh-old
    # Ubuntu 14.04 com SSH antigo (root:root)
    networks:
      vulnnet:
        ipv4_address: 172.30.3.2
    ports:
      - "2223:22"

  # ===========================================================================
  # CATEGORIA 4: SERVIÇOS DE REDE - SMB/SAMBA
